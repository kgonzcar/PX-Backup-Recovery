---
# Ensure govc is available and configured, then deploy and run FCD scripts

- name: Check if govc is installed
  stat:
    path: "{{ govc_binary_path }}"
  register: govc_stat

- name: Download govc binary archive
  get_url:
    url: "{{ govc_install_url }}"
    dest: /tmp/govc.gz
    mode: "0644"
  when:
    - not govc_stat.stat.exists
    - govc_install_url | default('') | length > 0

- name: Install govc binary
  command: "gunzip -c /tmp/govc.gz > {{ govc_binary_path }}"
  args:
    creates: "{{ govc_binary_path }}"
  when:
    - not govc_stat.stat.exists
    - govc_install_url | default('') | length > 0

- name: Ensure govc is executable
  file:
    path: "{{ govc_binary_path }}"
    mode: "0755"
  when:
    - not govc_stat.stat.exists
    - govc_install_url | default('') | length > 0

- name: Write govc environment file
  copy:
    dest: "{{ govc_env_file }}"
    mode: "0600"
    content: |
      # govc environment generated by Ansible
      {% for key, value in govc_env.items() %}
      export {{ key }}="{{ value }}"
      {% endfor %}

# -----------------------------
# Install scripts into /tmp dir
# -----------------------------

- name: Ensure FCD script directory exists
  file:
    path: "{{ fcd_script_dir }}"
    state: directory
    mode: "0755"

- name: Install FCD snapshot helper scripts
  copy:
    src: "{{ item }}"
    dest: "{{ fcd_script_dir }}/{{ item }}"
    mode: "0755"
  loop:
    - check_fcd_snapshots.sh
    - delete_fcd_snapshots.sh

# -----------------------------
# Run modes: check / cleanup / both
# -----------------------------

- name: Run FCD snapshot check (one-shot)
  command: "{{ fcd_script_dir }}/check_fcd_snapshots.sh"
  register: fcd_check
  changed_when: false
  ignore_errors: true
  when: fcd_run_mode in ['check', 'both']

- name: Show FCD snapshot check output
  debug:
    var: fcd_check.stdout_lines
  when:
    - fcd_run_mode in ['check', 'both']
    - fcd_check.stdout is defined

- name: Run FCD snapshot cleanup (one-shot)
  command: "{{ fcd_script_dir }}/delete_fcd_snapshots.sh"
  register: fcd_cleanup
  changed_when: true
  ignore_errors: true
  when: fcd_run_mode in ['cleanup', 'both']

# -----------------------------
# Optional cron in /tmp
# -----------------------------

- name: Ensure cron job for FCD snapshot cleanup
  cron:
    name: "PX FCD snapshot cleanup"
    user: "{{ lookup('env', 'USER') }}"
    job: "{{ fcd_script_dir }}/delete_fcd_snapshots.sh >> {{ fcd_log_file }} 2>&1"
    special_time: daily
  when: fcd_install_cron | default(false) | bool