---
# Cluster verification
# ----------------------------
- name: Verify access to primary cluster
  command: kubectl --kubeconfig={{ kubeconfig_primary }} get nodes
  register: primary_nodes
  changed_when: false
  failed_when: primary_nodes.rc != 0

- name: Verify access to secondary cluster
  command: kubectl --kubeconfig={{ kubeconfig_secondary }} get nodes
  register: secondary_nodes
  changed_when: false
  failed_when: secondary_nodes.rc != 0

# Stork presence checks
# ----------------------------
- name: Check if Stork BackupLocation CRD exists on primary
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_primary }}"
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: backuplocations.stork.libopenstorage.org
  register: primary_bl_crd
  failed_when: false
  changed_when: false

- name: Set fact whether Stork is installed on primary
  set_fact:
    stork_installed_primary: "{{ (primary_bl_crd.resources | default([]) | length) > 0 }}"

- name: Check if Stork BackupLocation CRD exists on secondary
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_secondary }}"
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: backuplocations.stork.libopenstorage.org
  register: secondary_bl_crd
  failed_when: false
  changed_when: false

- name: Set fact whether Stork is installed on secondary
  set_fact:
    stork_installed_secondary: "{{ (secondary_bl_crd.resources | default([]) | length) > 0 }}"

# BackupLocations
# ----------------------------

# Azure
- name: Create Azure BackupLocation on primary
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_primary }}"
    state: present
    definition: "{{ lookup('template', 'application_backup_schedule.yaml') | from_yaml }}"
  when:
    - backup_location_type == 'azure'
    - stork_installed_primary | default(false)

- name: Create Azure BackupLocation on secondary
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_secondary }}"
    state: present
    definition: "{{ lookup('template', 'backup_location_azure.yaml') | from_yaml }}"
  when:
    - backup_location_type == 'azure'
    - stork_installed_secondary | default(false)

# S3
- name: Create S3 BackupLocation on primary
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_primary }}"
    state: present
    definition: "{{ lookup('template', 'backup_location_s3.yaml') | from_yaml }}"
  when:
    - backup_location_type == 's3'
    - stork_installed_primary | default(false)

- name: Create S3 BackupLocation on secondary
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_secondary }}"
    state: present
    definition: "{{ lookup('template', 'backup_location_s3.yaml') | from_yaml }}"
  when:
    - backup_location_type == 's3'
    - stork_installed_secondary | default(false)

# NFS
- name: Create NFS BackupLocation on primary
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_primary }}"
    state: present
    definition: "{{ lookup('template', 'backup_location_nfs.yaml') | from_yaml }}"
  when:
    - backup_location_type == 'nfs'
    - stork_installed_primary | default(false)

- name: Create NFS BackupLocation on secondary
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_secondary }}"
    state: present
    definition: "{{ lookup('template', 'backup_location_nfs.yaml') | from_yaml }}"
  when:
    - backup_location_type == 'nfs'
    - stork_installed_secondary | default(false)

# SchedulePolicy
# ----------------------------
- name: Create SchedulePolicy for PX-Backup
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_primary }}"
    state: present
    definition: "{{ lookup('template', 'schedule_policy.yaml') | from_yaml }}"

# ApplicationBackupSchedule
# ----------------------------
- name: Create ApplicationBackupSchedule for PX-Backup
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_primary }}"
    state: present
    definition: "{{ lookup('template', 'application_backup_schedule.yaml') | from_yaml }}"