apiVersion: stork.libopenstorage.org/v1alpha1
kind: BackupLocation
metadata:
  name: "{{ backup_location_name }}"
  namespace: "{{ pxb_namespace }}"
location:
  type: nfs
  path: "{{ backup_location_nfs.path }}"       # subdir under export, or "/"
  sync: true
  nfsConfig:
    server: "{{ backup_location_nfs.server }}"
    exportPath: "{{ backup_location_nfs.export_path }}"